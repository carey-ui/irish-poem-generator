<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <link rel="stylesheet" href="SRC/style.css" />
    <title>AI Irish Poem Generator</title>
  </head>
  <body>
    <div class="container">
      <header><h1>AI Irish Poem Generator</h1></header>
      <main>
        <div class="form-wrapper">
          <form id="poem-generator-form">
            <input
              type="text"
              placeholder="Enter a word to generate an Irish poem"
              autofocus
              required
              autocomplete="off"
              class="prompt"
              id="user-instructions"
            />
            <input type="submit" class="submit-button" />
          </form>
          <div class="hints">i.e. butterflies, sunshine, flowers</div>
        </div>

        <div class="poem hidden" id="poem"></div>
        <div id="poem-spinner">
          <div class="loader hidden" id="loader"></div>
        </div>
      </main>

      <footer>
        This AI project was coded by
        <a
          href="https://www.shecodes.io/graduates/177281-carey-faherty"
          target="blank"
          >Carey Faherty</a
        >
        and is open-sourced on
        <a
          href="https://github.com/carey-ui/irish-poem-generator"
          target="blank"
          >GitHub</a
        >
        and is hosted on
        <a href="https://irishpoemgeneratorproject.netlify.app/" target="blank"
          >Netlify</a
        >.
      </footer>
    </div>
    <script src="SRC/index.js"></script>
  </body>
</html>
